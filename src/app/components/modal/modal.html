<div>
  <div *ngIf="mensajeGlobal()" class="alert alert-info">
    {{mensajeGlobal()}}
  </div>
<ng-container [ngSwitch]="formType()">
  <app-sign-in *ngSwitchCase="'login'"></app-sign-in>
  <app-sign-up *ngSwitchCase="'register'"></app-sign-up>
  <app-empleado-form *ngSwitchCase="'editar'" [empleado]="empleadoSeleccionado"></app-empleado-form>
  <app-empleado-detalle *ngSwitchCase="'detalle'" [empleado]="empleadoSeleccionado"></app-empleado-detalle>
</ng-container>
</div>
