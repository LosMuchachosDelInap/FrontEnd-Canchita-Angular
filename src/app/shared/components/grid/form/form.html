<form (ngSubmit)="onSubmit()" *ngIf="!soloLectura || modo === 'detalle'">
  <mat-form-field>
    <input matInput placeholder="Nombre" [value]="nombre()" (input)="nombre.set($event.target.value)" [readonly]="soloLectura" required>
  </mat-form-field>
  <mat-form-field>
    <input matInput placeholder="Apellido" [value]="apellido()" (input)="apellido.set($event.target.value)" [readonly]="soloLectura" required>
  </mat-form-field>
  <mat-form-field>
    <input matInput placeholder="Edad" [value]="edad()" (input)="edad.set($event.target.value)" [readonly]="soloLectura" required>
  </mat-form-field>
  <mat-form-field>
    <input matInput placeholder="DNI" [value]="dni()" (input)="dni.set($event.target.value)" [readonly]="soloLectura" required>
  </mat-form-field>
  <mat-form-field>
    <input matInput placeholder="Teléfono" [value]="telefono()" (input)="telefono.set($event.target.value)" [readonly]="soloLectura" required>
  </mat-form-field>
  <mat-form-field>
    <input matInput placeholder="Email" type="email" [value]="email()" (input)="email.set($event.target.value)" [readonly]="soloLectura" required>
  </mat-form-field>
  <mat-form-field *ngIf="!soloLectura">
    <input matInput placeholder="Clave" type="password" [value]="clave()" (input)="clave.set($event.target.value)" required>
  </mat-form-field>
  <mat-form-field>
    <input matInput placeholder="Rol" type="number" [value]="rol()" (input)="rol.set($event.target.value)" [readonly]="soloLectura" required>
  </mat-form-field>
  <button mat-raised-button color="primary" type="submit" *ngIf="!soloLectura">
    {{ modo === 'registro' ? 'Registrar' : 'Guardar cambios' }}
  </button>
</form>
<!-- Si soloLectura, muestra los datos sin formulario -->
<div *ngIf="soloLectura">
  <p><strong>Nombre:</strong> {{ nombre() }}</p>
  <p><strong>Apellido:</strong> {{ apellido() }}</p>
  <p><strong>Edad:</strong> {{ edad() }}</p>
  <p><strong>DNI:</strong> {{ dni() }}</p>
  <p><strong>Teléfono:</strong> {{ telefono() }}</p>
  <p><strong>Email:</strong> {{ email() }}</p>
  <p><strong>Rol:</strong> {{ rol() }}</p>
</div>
